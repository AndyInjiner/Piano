<!DOCTYPE html>
<html lang="ru">
<head>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<meta charset='UTF-8'>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  color: white;
  min-height: 100vh;
  padding: 20px;
}
.container {
  max-width: 600px;
  margin: 0 auto;
}
h1 {
  color: #00d9ff;
  text-align: center;
  margin-bottom: 20px;
  font-size: 28px;
}
.card {
  background: rgba(255,255,255,0.1);
  border-radius: 15px;
  padding: 20px;
  margin-bottom: 20px;
}
.card h2 {
  color: #00d9ff;
  margin-bottom: 15px;
  font-size: 18px;
}
.upload-area {
  border: 2px dashed #00d9ff;
  border-radius: 10px;
  padding: 30px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
}
.upload-area:hover {
  background: rgba(0,217,255,0.1);
  border-color: #00b8d4;
}
.upload-area input {
  display: none;
}
.btn {
  background: #00d9ff;
  color: #1a1a2e;
  border: none;
  padding: 12px 24px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
  margin: 5px;
  transition: all 0.3s;
}
.btn:hover { background: #00b8d4; transform: scale(1.05); }
.btn-play { background: #00aa00; }
.btn-play:hover { background: #00cc00; }
.btn-stop { background: #aa0000; }
.btn-stop:hover { background: #cc0000; }
.btn-select { background: #4444ff; }
.btn-select:hover { background: #6666ff; }
.btn-mute { background: #ff8800; }
.btn-mute:hover { background: #ffaa00; }
.btn-mute.muted { background: #666666; color: #ff0000; }
.file-list {
  max-height: 300px;
  overflow-y: auto;
}
.file-item {
  background: rgba(255,255,255,0.05);
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.3s;
}
.file-item:hover {
  background: rgba(255,255,255,0.1);
}
.file-item.selected {
  background: rgba(0,217,255,0.3);
  border: 1px solid #00d9ff;
}
.file-item .name {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-right: 10px;
}
.file-item .info {
  color: #888;
  font-size: 12px;
  margin-right: 10px;
}
.controls {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
}
.slider-container {
  margin-top: 15px;
}
.slider-container label {
  display: block;
  margin-bottom: 8px;
  color: #00d9ff;
}
input[type="range"] {
  width: 100%;
  height: 8px;
  border-radius: 4px;
  background: #333;
  outline: none;
  -webkit-appearance: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #00d9ff;
  cursor: pointer;
}
.status-bar {
  background: rgba(0,217,255,0.2);
  border-radius: 8px;
  padding: 12px;
  text-align: center;
  margin-top: 15px;
}
.status-bar .status {
  font-size: 16px;
  font-weight: bold;
}
.status-bar .speed {
  color: #00d9ff;
  margin-top: 5px;
}
.piano-preview {
  display: flex;
  gap: 2px;
  height: 60px;
  margin-top: 15px;
  overflow-x: auto;
}
.key {
  min-width: 20px;
  border-radius: 0 0 4px 4px;
  transition: all 0.1s;
}
.key.white {
  background: white;
  border: 1px solid #ccc;
}
.key.black {
  background: #333;
  min-width: 14px;
}
.key.active {
  background: #00d9ff !important;
  box-shadow: 0 0 10px #00d9ff;
}
.info-text {
  color: #888;
  font-size: 12px;
  text-align: center;
  margin-top: 20px;
}
.info-text a {
  color: #00d9ff;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.playing {
  animation: pulse 1s infinite;
}
</style>
<title>ESP32 Piano Trainer</title>
</head>
<body>

<div class="container">
  <h1>🎹 ESP32 Piano Trainer</h1>

  <!-- Загрузка файла -->
  <div class="card">
    <h2>📁 Загрузка MIDI файла</h2>
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <p>Нажмите для выбора файла</p>
      <p style="color:#888;font-size:12px;margin-top:5px;">или перетащите файл сюда</p>
      <input type="file" id="fileInput" accept=".mid,.midi" onchange="uploadFile(this.files[0])">
    </div>
    <p class="info-text" style="margin-top:10px;">
      💡 Конвертируйте MP3 в MIDI через <a href="https://basicpitch.spotify.com" target="_blank">Spotify Basic Pitch</a>
    </p>
  </div>

  <!-- Список файлов -->
  <div class="card">
    <h2>📋 Доступные файлы</h2>
    <div class="file-list" id="fileList">
      <p style="color:#888;text-align:center;">Загрузка...</p>
    </div>
  </div>

  <!-- Управление -->
  <div class="card">
    <h2>🎮 Управление</h2>
    <div class="controls">
      <button class="btn btn-select" onclick="selectFile()">📋 Выбрать</button>
      <button class="btn btn-play" onclick="playFile()">▶ PLAY</button>
      <button class="btn btn-stop" onclick="stopFile()">⏹ STOP</button>
      <button class="btn btn-mute" id="btnMute" onclick="toggleMute()">🔊 SND</button>
    </div>

    <div class="slider-container">
      <label>Скорость: <span id="speedValue">1.0</span>x</label>
      <input type="range" id="speedSlider" min="10" max="200" value="100" oninput="setSpeed(this.value/100)">
    </div>
  </div>

  <!-- Статус -->
  <div class="status-bar" id="statusBar">
    <div class="status" id="statusText">Ожидание...</div>
    <div class="speed" id="speedText">Скорость: 1.0x</div>
  </div>

  <!-- Визуализация пианино -->
  <div class="card">
    <h2>🎹 Пианино (превью)</h2>
    <div class="piano-preview" id="pianoPreview"></div>
  </div>
</div>

<script>
let files = [];
let selectedIndex = 0;
let isPlaying = false;
let speed = 1.0;
let soundEnabled = true;  // Состояние звука
let ws = null;

// Инициализация
document.addEventListener('DOMContentLoaded', () => {
  loadFiles();
  createPianoPreview();
  connectWebSocket();
  updateStatus();
  updateMuteButton();  // Обновить кнопку MUTE
});

// Загрузка списка файлов
function loadFiles() {
  fetch('/files')
    .then(r => r.json())
    .then(data => {
      files = data.files || [];
      renderFileList();
    })
    .catch(err => {
      document.getElementById('fileList').innerHTML = 
        '<p style="color:#ff6666;text-align:center;">Ошибка загрузки</p>';
      console.error(err);
    });
}

function renderFileList() {
  const container = document.getElementById('fileList');
  
  if (files.length === 0) {
    container.innerHTML = '<p style="color:#888;text-align:center;">Нет файлов. Загрузите MIDI файл.</p>';
    return;
  }
  
  let html = '';
  files.forEach((f, i) => {
    html += `<div class="file-item ${i === selectedIndex ? 'selected' : ''}" onclick="selectIndex(${i})">
      <span class="name">${escapeHtml(f.name)}</span>
      <span class="info">${f.notes || 0} нот</span>
      <button class="btn btn-play" style="padding:6px 12px;font-size:14px;" onclick="event.stopPropagation(); playIndex(${i})">▶</button>
    </div>`;
  });
  
  container.innerHTML = html;
}

function selectIndex(i) {
  selectedIndex = i;
  renderFileList();
}

function selectFile() {
  if (files.length === 0) {
    alert('Нет доступных файлов');
    return;
  }
  // already selected via click
}

function playIndex(i) {
  selectIndex(i);
  playFile();
}

function playFile() {
  if (files.length === 0) {
    alert('Нет файлов для воспроизведения');
    return;
  }
  
  fetch(`/play?index=${selectedIndex}`)
    .then(r => r.text())
    .then(data => {
      isPlaying = true;
      document.getElementById('statusBar').classList.add('playing');
      updateStatus();
    })
    .catch(err => {
      alert('Ошибка воспроизведения');
    });
}

function stopFile() {
  fetch('/stop', { method: 'POST' })
    .then(() => {
      isPlaying = false;
      document.getElementById('statusBar').classList.remove('playing');
      updateStatus();
    })
    .catch(err => {
      alert('Ошибка остановки');
    });
}

function setSpeed(val) {
  speed = val;
  document.getElementById('speedValue').textContent = speed.toFixed(1);

  fetch(`/speed?value=${speed}`)
    .catch(err => console.error(err));

  updateStatus();
}

function toggleMute() {
  fetch('/mute')
    .then(r => r.text())
    .then(data => {
      soundEnabled = data === '1';
      updateMuteButton();
    })
    .catch(err => console.error(err));
}

function updateMuteButton() {
  const btn = document.getElementById('btnMute');
  if (btn) {
    if (soundEnabled) {
      btn.textContent = '🔊 SND';
      btn.classList.remove('muted');
    } else {
      btn.textContent = '🔇 MUTE';
      btn.classList.add('muted');
    }
  }
}

function uploadFile(file) {
  if (!file) return;
  
  const formData = new FormData();
  formData.append('midi', file);
  
  fetch('/upload', {
    method: 'POST',
    body: formData
  })
  .then(r => {
    if (r.ok) {
      alert('Файл загружен успешно!');
      loadFiles();
    } else {
      alert('Ошибка загрузки файла');
    }
  })
  .catch(err => {
    alert('Ошибка: ' + err.message);
  });
}

function updateStatus() {
  fetch('/status')
    .then(r => r.json())
    .then(data => {
      document.getElementById('statusText').textContent = data.status || 'Ожидание...';
      document.getElementById('speedText').textContent = `Скорость: ${data.speed || 1.0}x`;
      if (data.sound !== undefined) {
        soundEnabled = data.sound;
        updateMuteButton();
      }
    })
    .catch(() => {
      // Игнорируем ошибки
    });
}

function connectWebSocket() {
  const wsUrl = `ws://${window.location.hostname}:81/`;
  ws = new WebSocket(wsUrl);
  
  ws.onmessage = (event) => {
    const msg = event.data;

    if (msg.startsWith('PLAY:')) {
      isPlaying = true;
      document.getElementById('statusBar').classList.add('playing');
    } else if (msg === 'STOP') {
      isPlaying = false;
      document.getElementById('statusBar').classList.remove('playing');
      clearPianoKeys();
    } else if (msg.startsWith('SPEED:')) {
      speed = parseFloat(msg.substring(6));
      document.getElementById('speedSlider').value = speed * 100;
      document.getElementById('speedValue').textContent = speed.toFixed(1);
    } else if (msg.startsWith('MUTE:')) {
      soundEnabled = msg.substring(5) === '1';
      updateMuteButton();
    } else if (msg === 'END') {
      isPlaying = false;
      document.getElementById('statusBar').classList.remove('playing');
      clearPianoKeys();
    }
  };
  
  ws.onerror = (err) => {
    console.log('WebSocket error, retrying...');
    setTimeout(connectWebSocket, 3000);
  };
}

function createPianoPreview() {
  const container = document.getElementById('pianoPreview');
  const notes = [
    // Октава 0
    {n:'A',w:1}, {n:'A#',b:1}, {n:'B',w:1},
    // Октава 1
    {n:'C',w:1}, {n:'C#',b:1}, {n:'D',w:1}, {n:'D#',b:1}, {n:'E',w:1}, {n:'F',w:1}, {n:'F#',b:1}, {n:'G',w:1}, {n:'G#',b:1}, {n:'A',w:1}, {n:'A#',b:1}, {n:'B',w:1},
    // Октава 2
    {n:'C',w:1}, {n:'C#',b:1}, {n:'D',w:1}, {n:'D#',b:1}, {n:'E',w:1}, {n:'F',w:1}, {n:'F#',b:1}, {n:'G',w:1}, {n:'G#',b:1}, {n:'A',w:1}, {n:'A#',b:1}, {n:'B',w:1},
    // Октава 3
    {n:'C',w:1}, {n:'C#',b:1}, {n:'D',w:1}, {n:'D#',b:1}, {n:'E',w:1}, {n:'F',w:1}, {n:'F#',b:1}, {n:'G',w:1}, {n:'G#',b:1}, {n:'A',w:1}, {n:'A#',b:1}, {n:'B',w:1},
    // Октава 4
    {n:'C',w:1}, {n:'C#',b:1}, {n:'D',w:1}, {n:'D#',b:1}, {n:'E',w:1}, {n:'F',w:1}, {n:'F#',b:1}, {n:'G',w:1}, {n:'G#',b:1}, {n:'A',w:1}, {n:'A#',b:1}, {n:'B',w:1},
    {n:'C',w:1}
  ];
  
  let html = '';
  notes.forEach((note, i) => {
    if (i >= 54) return;
    const cls = note.b ? 'black' : 'white';
    html += `<div class="key ${cls}" id="key${i}"></div>`;
  });
  
  container.innerHTML = html;
}

function clearPianoKeys() {
  document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Автообновление статуса
setInterval(updateStatus, 2000);
</script>
</body>
</html>
